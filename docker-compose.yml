version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-reflection-db
    environment:
      POSTGRES_USER: reflection_user
      POSTGRES_PASSWORD: reflection_password
      POSTGRES_DB: daily_reflection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reflection_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
